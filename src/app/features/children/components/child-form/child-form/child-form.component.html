<form (submit)="onSubmit($event)" class="space-y-4 p-4">
  <!-- Documento -->
  <div>
    <app-input
      type="text"
      label="N° Documento"
      [control]="documentNumberControl"
    ></app-input>
  </div>

  <!-- Nombres -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-input
      type="text"
      label="Nombre"
      [control]="firstNameControl"
    ></app-input>

    <app-input
      type="text"
      label="Apellido"
      [control]="lastNameControl"
    ></app-input>
  </div>

  <!-- Fechas -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-input
      type="date"
      label="Fecha de nacimiento"
      [control]="birthdayControl"
    ></app-input>

    <app-input
      type="date"
      label="Fecha de admisión"
      [control]="admissionDateControl"
    ></app-input>
  </div>

  <!-- Comunidad -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Local comunal</label>
    <select [formField]="communityHallIdControl"
      class="w-full px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
      [class.border-red-500]="communityHallIdControl().invalid() && communityHallIdControl().touched()"
      [class.border-gray-300]="!(communityHallIdControl().invalid() && communityHallIdControl().touched())"
    >
      <option value="" disabled>Seleccione un local comunal</option>
      @for (hall of communityHalls(); track hall) {
        <option [value]="hall.id">{{ hall.localId }} - {{ hall.name }}</option>
      }
    </select>
    @if (communityHallIdControl().invalid() && communityHallIdControl().touched()) {
      <div class="mt-1 text-xs text-red-500">
        @for (error of communityHallIdControl().errors(); track error) {
          <span class="block">{{ error.message }}</span>
        }
      </div>
    }
  </div>

  <!-- Botón -->
  <div class="flex justify-end pt-2">
    <app-button
      type="submit"
      [disabled]="form().invalid()"
      [isLoading]="isLoading()"
      label="Guardar"
    ></app-button>
  </div>
</form>
