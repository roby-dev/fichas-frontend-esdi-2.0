<form (submit)="onSubmit($event)" class="p-4">
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de documento</label>
      <select
        [formField]="documentTypeControl"
        class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
        <option value="DNI">DNI</option>
        <option value="CE">Carné de extranjería</option>
        <option value="PASAPORTE">Pasaporte</option>
      </select>
    </div>

    <app-input
      type="text"
      label="Número de documento"
      [control]="documentNumberControl"
    ></app-input>

    <app-input
      type="text"
      label="Nombres"
      [control]="firstNameControl"
    ></app-input>

    <app-input
      type="text"
      label="Apellidos"
      [control]="lastNameControl"
    ></app-input>

    <app-input
      type="text"
      label="Teléfono"
      [control]="phoneControl"
    ></app-input>

    <app-input
      type="date"
      label="Fecha de inicio"
      [control]="startDateControl"
    ></app-input>

    @if (isCreateMode()) {
      <div class="sm:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Local comunal</label>
        <select
          [formField]="communityHallIdControl"
          class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
          <option value="">Selecciona un local comunal</option>
          @for (hall of halls(); track hall.id) {
            <option [value]="hall.id">{{ hall.name }}</option>
          }
        </select>
        @if (communityHallIdControl().invalid() && communityHallIdControl().touched()) {
          <div class="mt-1 text-xs text-red-500">
            @for (error of communityHallIdControl().errors(); track error) {
              <span class="block">{{ error.message }}</span>
            }
          </div>
        }
      </div>
    }
  </div>

  <div class="flex justify-end pt-6">
    <app-button
      [label]="isLoading() ? 'Guardando...' : 'Guardar'"
      [disabled]="isLoading() || form().invalid()"
      type="submit"
    ></app-button>
  </div>
</form>
