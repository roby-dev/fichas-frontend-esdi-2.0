<div>
  <h2 class="mb-4 text-lg font-semibold">Marcado asistido</h2>

  <form class="max-w-3xl space-y-4 rounded bg-white p-4 shadow-sm" (submit)="onSubmit($event)">
    <label class="block text-sm text-gray-700">
      Madre cuidadora
      <select class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" [value]="caregiverId()" (change)="onCaregiverChange($any($event.target).value)">
        <option value="">Selecciona una madre cuidadora</option>
        @for (caregiver of caregivers(); track caregiver.id) {
          <option [value]="caregiver.id">{{ caregiver.fullName }} - {{ caregiver.documentNumber }}</option>
        }
      </select>
    </label>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <label class="text-sm text-gray-700">
        Fecha
        <input type="date" class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" [value]="localDate()" (input)="localDate.set($any($event.target).value)" />
      </label>
      <label class="text-sm text-gray-700">
        Hora de entrada
        <input type="time" class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" [value]="entryTime()" (input)="entryTime.set($any($event.target).value)" />
      </label>
    </div>

    <label class="block text-sm text-gray-700">
      Bloque
      <select class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" [value]="blockId()" (change)="blockId.set($any($event.target).value)">
        <option value="">Selecciona un bloque del horario activo</option>
        @for (block of activeBlocks(); track block.id) {
          <option [value]="block.id">{{ block.name }} ({{ block.entryTime }})</option>
        }
      </select>
    </label>

    <label class="block text-sm text-gray-700">
      Motivo
      <textarea class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" rows="3" [value]="reason()" (input)="reason.set($any($event.target).value)"></textarea>
    </label>

    @if (assignmentError() || markState.error()) {
      <p class="text-sm text-red-600" role="alert">{{ assignmentError() || markState.error() }}</p>
    }

    @if (markState.lastMark()) {
      <p class="text-sm text-green-700" role="status">Asistencia registrada correctamente.</p>
    }

    <div class="flex justify-end">
      <app-button label="Registrar asistencia" type="submit" [disabled]="isInvalid() || markState.isSubmitting()" [isLoading]="markState.isSubmitting()" />
    </div>
  </form>
</div>
