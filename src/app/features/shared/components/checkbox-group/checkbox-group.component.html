<div class="w-full">
  @if (label()) {
    <span class="block text-sm font-medium text-gray-700 mb-2">{{ label() }}</span>
  }
  <div class="flex flex-wrap gap-2">
    @for (option of options(); track option.value) {
      <label
        class="flex items-center gap-2 cursor-pointer select-none px-3 py-2 rounded-lg border text-sm font-medium transition-colors"
        [ngClass]="{
          'bg-blue-50 border-blue-500 text-blue-700': isSelected(option.value),
          'bg-white border-gray-300 text-gray-700 hover:border-gray-400': !isSelected(option.value)
        }">
        <input
          type="checkbox"
          class="sr-only"
          [checked]="isSelected(option.value)"
          (change)="toggle(option.value)"
        />
        {{ option.label }}
      </label>
    }
  </div>
</div>
