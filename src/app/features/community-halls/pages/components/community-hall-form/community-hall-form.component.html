<form (submit)="onSubmit($event)" class="space-y-4 p-4">
  <div>
    <app-input
      type="text"
      label="ID Local"
      [control]="localIdControl"
    ></app-input>
  </div>

  <div>
    <app-input
      type="text"
      label="Nombre Local"
      [control]="nameControl"
    ></app-input>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Comité de Gestión</label>
    <select
      [formField]="committeeRefControl"
      class="mt-1 block w-full rounded-lg border px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
      [class.border-red-500]="committeeRefControl().invalid() && committeeRefControl().touched()"
      [class.border-gray-300]="!(committeeRefControl().invalid() && committeeRefControl().touched())"
    >
      <option value="" disabled>Seleccione Comité de Gestión</option>
      @for(committee of committees(); track committee.id){
      <option [value]="committee.id">
        {{ committee.committeeId }} - {{ committee.name }}
        @if (committee.user?.email) {
          - {{ committee.user?.email }}
        }
      </option>
      }
    </select>
    @if (committeeRefControl().invalid() && committeeRefControl().touched()) {
      <div class="mt-1 text-xs text-red-500">
        @for (error of committeeRefControl().errors(); track error) {
          <span class="block">{{ error.message }}</span>
        }
      </div>
    }
  </div>

  <div class="flex justify-end pt-2">
    <app-button
      [label]="isLoading() ? 'Guardando...' : 'Guardar'"
      [disabled]="isLoading() || form().invalid()"
      type="submit"
    ></app-button>
  </div>
</form>
