<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold">Comités</h2>
  <app-button label="Crear" (action)="openModal()" />
</div>

<div class="overflow-x-auto bg-white shadow-sm rounded">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-4 py-2 text-center text-sm font-medium text-gray-600 w-[60px]">ID</th>
        <th class="px-4 py-2 text-left text-sm font-medium text-gray-600">Nombre</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      @for (committee of adminCommitteeState.committees(); track committee.id) {
        <tr
          class="hover:bg-gray-50 transition-colors cursor-pointer"
          (click)="openModal(committee)">
          <td class="px-4 py-2 text-sm text-gray-800 text-center">{{ committee.committeeId }}</td>
          <td class="px-4 py-2 text-sm text-gray-800">{{ committee.name }}</td>
        </tr>
      } @empty {
        <tr>
          <td colspan="2" class="px-4 py-8 text-sm text-center text-gray-500">
            No hay comités registrados.
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

@if (isModalOpen()) {
  <app-modal
    [title]="selectedCommittee() ? 'Editar comité' : 'Crear comité'"
    size="lg"
    (closed)="closeModal()">
    <app-committee-form
      [committee]="selectedCommittee()"
      (saveComitteeEvent)="onCommitteeSaved($event)"
      [isLoading]="isLoading()"
    />
  </app-modal>
}
