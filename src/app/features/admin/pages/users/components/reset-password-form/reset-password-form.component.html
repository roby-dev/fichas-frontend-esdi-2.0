<form (submit)="onSubmit($event)" class="flex flex-col gap-4">
  <div class="text-sm text-gray-600 mb-2">
    Ingresá una contraseña temporal para este usuario. Todas sus sesiones actuales se cerrarán, y se le exigirá cambiar la contraseña la próxima vez que inicie sesión.
  </div>

  <app-input
    type="password"
    id="temporaryPassword"
    label="Contraseña temporal"
    placeholder="Mínimo 6 caracteres"
    [control]="temporaryPasswordControl"
  />

  <app-input
    type="password"
    id="confirmPassword"
    label="Confirmar contraseña"
    placeholder="Repetí la contraseña"
    [control]="confirmPasswordControl"
  />

  @if (mismatchError()) {
    <p class="text-sm text-red-600">{{ mismatchError() }}</p>
  }

  <div class="flex justify-end gap-3 mt-4">
    <button
      type="button"
      (click)="cancelled.emit()"
      class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
    >
      Cancelar
    </button>
    <button
      type="submit"
      [disabled]="isLoading()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50"
    >
      @if (isLoading()) {
        <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Reseteando...
      } @else {
        Resetear contraseña
      }
    </button>
  </div>
</form>
