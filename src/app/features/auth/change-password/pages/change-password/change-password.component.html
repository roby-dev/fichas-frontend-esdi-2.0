<div class="flex flex-col h-full bg-white rounded shadow p-6 max-w-md w-full mx-auto mt-10">
  <div class="mb-6 text-center">
    <h1 class="text-2xl font-bold text-gray-800">Cambiar Contraseña</h1>
    <p class="text-sm text-gray-500 mt-2">
      Por seguridad, debés cambiar tu contraseña antes de continuar.
    </p>
  </div>

  <form class="flex flex-col gap-4" (submit)="onSubmit($event)">
    <app-input
      type="password"
      id="currentPassword"
      label="Contraseña actual"
      placeholder="Ingresá tu contraseña actual"
      [control]="currentPasswordControl"
    />
    
    <app-input
      type="password"
      id="newPassword"
      label="Nueva contraseña"
      placeholder="Mínimo 6 caracteres"
      [control]="newPasswordControl"
    />

    <app-input
      type="password"
      id="confirmPassword"
      label="Confirmar nueva contraseña"
      placeholder="Repetí la nueva contraseña"
      [control]="confirmPasswordControl"
    />

    @if (mismatchError()) {
      <p class="text-sm text-red-600">{{ mismatchError() }}</p>
    }

    <button
      type="submit"
      [disabled]="isLoading()"
      class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-70"
    >
      @if (isLoading()) {
        <svg class="w-4 h-4 animate-spin text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Cambiando...
      } @else {
        Actualizar contraseña
      }
    </button>
  </form>

  <div class="mt-6 text-center">
    <button
      type="button"
      (click)="logout()"
      class="text-sm text-gray-500 hover:text-gray-700 underline"
    >
      Cerrar sesión
    </button>
  </div>
</div>
