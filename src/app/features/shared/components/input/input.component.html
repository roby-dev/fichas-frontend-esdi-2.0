<div class="w-full">
  @if (label()) {
    <label [for]="id() || null" class="block text-sm font-medium text-gray-700 mb-1">
      {{ label() }}
    </label>
  }
  
  <input
    [id]="id() || null"
    [type]="type()"
    [placeholder]="placeholder()"
    [formField]="control()"
    class="w-full px-3 py-2 border rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
    [ngClass]="{
      'border-red-500': control()().invalid() && control()().touched(),
      'border-gray-300': !(control()().invalid() && control()().touched())
    }"
  />
  
  @if (control()().invalid() && control()().touched()) {
    <div class="mt-1 text-xs text-red-500">
      @for (error of control()().errors(); track error) {
        <span class="block">{{ error.message }}</span>
      }
      <ng-content select="[custom-errors]"></ng-content>
    </div>
  }
</div>
