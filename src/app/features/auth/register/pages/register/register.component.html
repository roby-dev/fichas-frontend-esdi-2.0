<div>
  @if(!isUserCreated()){
  <h2 class="text-2xl font-bold text-gray-900 mb-6">Regístrate</h2>

  <form (submit)="onSubmit($event)">
    <!-- Email Input -->
    <div class="mb-4">
      <app-input
        id="email"
        type="email"
        label="Correo electrónico"
        [control]="emailControl"
      ></app-input>
    </div>

    <div class="mb-6">
      <app-input
        id="password"
        type="password"
        label="Contraseña"
        [control]="passwordControl"
      ></app-input>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="registerForm().invalid() || isLoading()"
      class="w-full py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50"
    >
      @if(!isLoading()) {
      <span> Registrar</span>
      }@else{
      <div class="flex justify-center items-center">
        <svg
          class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span>Ingresando...</span>
      </div>
      }
    </button>
  </form>

  <div class="mt-5 text-center">
    <p class="text-sm text-gray-600">¿Ya tienes una cuenta?</p>
    <a routerLink="/auth/login" class="text-sm font-medium text-blue-600 hover:text-blue-500">Ingresa aqui</a>
  </div>
  }@else {
  <p class="font-bold">Felicitaciones, su usuario fue creado.</p>
  <p class="mt-3">
    Ahora puedes ingresar con tu correo y contraseña
    <a class="font-medium text-blue-600 hover:text-blue-500" routerLink="/auth/login">desde aquí.</a>
  </p>
  }
</div>
